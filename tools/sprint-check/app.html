<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sprint-check</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #0d0d10;
      --surface:        #13131a;
      --surface-raised: #1a1a24;
      --surface-hover:  #1e1e2a;
      --border:         #232333;
      --border-muted:   #1b1b28;
      --border-hover:   #353548;
      --text:           #e0e0ec;
      --text-muted:     #6a6a82;
      --text-dim:       #363650;
      --accent:         #7c6af7;
      --accent-dim:     rgba(124,106,247,0.12);

      --col-open:       #94a3b8;
      --col-progress:   #60a5fa;
      --col-done:       #4ade80;
      --col-discarded:  #f87171;

      --sidebar-w: 240px;
      --header-h:  48px;
      --radius:    8px;
      --radius-sm: 5px;
    }

    /* ── Light mode overrides ─────────────────── */
    html[data-theme="light"] {
      --bg:             #f2f2f7;
      --surface:        #ffffff;
      --surface-raised: #f7f7fc;
      --surface-hover:  #ededf5;
      --border:         #dcdce8;
      --border-muted:   #e8e8f2;
      --border-hover:   #c0c0d4;
      --text:           #1a1a2e;
      --text-muted:     #52527a;
      --text-dim:       #b8b8d0;
      --accent:         #6c5cf7;
      --accent-dim:     rgba(108,92,247,0.10);

      --col-open:       #64748b;
      --col-progress:   #2563eb;
      --col-done:       #16a34a;
      --col-discarded:  #dc2626;
    }

    /* smooth theme transition */
    html { transition: background .2s, color .2s; }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px; line-height: 1.5; overflow: hidden; }

    /* ── App shell ────────────────────────────── */
    #app { display: grid; grid-template-rows: var(--header-h) 1fr; height: 100vh; }

    /* ── Header ───────────────────────────────── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; border-bottom: 1px solid var(--border);
      background: var(--surface); gap: 12px;
    }
    .header-left  { display: flex; align-items: center; gap: 10px; }
    .brand        { display: flex; align-items: center; gap: 8px; font-weight: 600; letter-spacing: -.3px; }
    .brand-icon   { width: 20px; height: 20px; background: var(--accent); border-radius: 5px;
                    display: flex; align-items: center; justify-content: center;
                    font-size: 11px; color: #fff; font-weight: 700; flex-shrink: 0; }
    .header-sep   { color: var(--border-hover); font-size: 16px; }
    .header-project { font-size: 13px; color: var(--text-muted); }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-branch {
      display: flex; align-items: center; gap: 5px; font-size: 12px;
      color: var(--text-muted);
    }
    .branch-name { font-family: ui-monospace, "Cascadia Code", monospace; color: var(--accent); }
    .refresh-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--col-done);
                   transition: background .3s; flex-shrink: 0; }
    .refresh-dot.mock    { background: #fb923c; }
    .refresh-dot.loading { background: var(--col-progress); animation: pulse 1s infinite; }
    .refresh-dot.error   { background: var(--col-discarded); }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    .header-stats { display: flex; gap: 8px; }
    .stat {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 9px; background: var(--surface-raised);
      border: 1px solid var(--border); border-radius: 20px; font-size: 11px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink:0; }

    /* ── Main layout ──────────────────────────── */
    #main { display: flex; overflow: hidden; }

    /* ── Sidebar ──────────────────────────────── */
    #sidebar {
      flex-shrink: 0; width: var(--sidebar-w);
      border-right: 1px solid var(--border); background: var(--surface);
      overflow: hidden; display: flex; flex-direction: column;
      transition: width .2s ease;
    }
    #sidebar.collapsed { width: 36px; }
    #sidebar.collapsed .sidebar-content { display: none; }

    .sidebar-toggle {
      flex-shrink: 0; height: 34px;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 9px; border-bottom: 1px solid var(--border-muted);
      cursor: pointer; color: var(--text-muted);
      transition: background .1s, color .1s;
    }
    .sidebar-toggle:hover { background: var(--surface-raised); color: var(--text); }
    #sidebar.collapsed .sidebar-toggle { justify-content: center; }
    .sidebar-toggle svg { width: 14px; height: 14px; stroke: currentColor;
                          fill: none; stroke-width: 2; stroke-linecap: round;
                          stroke-linejoin: round; flex-shrink: 0;
                          transition: transform .2s; }
    #sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }

    .sidebar-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    /* ── Resize handle ────────────────────────── */
    #sidebar-resize {
      width: 5px; flex-shrink: 0; cursor: col-resize;
      background: transparent; transition: background .15s;
    }
    #sidebar-resize:hover, #sidebar-resize.dragging { background: var(--accent); }
    .sidebar-section { padding: 14px 16px; border-bottom: 1px solid var(--border-muted); }
    .sidebar-label {
      font-size: 11px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
    }
    /* ── Now working on ──────────────────────────── */
    #s-wip { display: none; }
    #s-wip.has-items {
      display: block;
      background: var(--accent-dim);
      border-left: 3px solid var(--accent);
      border-bottom: 1px solid rgba(124,106,247,0.25);
    }
    #s-wip .sidebar-label {
      color: var(--accent);
      letter-spacing: .12em;
    }
    .wip-item {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 0; border-bottom: 1px solid rgba(124,106,247,0.15);
      cursor: pointer; border-radius: var(--radius-sm); transition: background .1s;
    }
    .wip-item:hover { background: rgba(124,106,247,0.12); }
    .wip-item:last-child { border-bottom: none; }
    .wip-id {
      font-family: ui-monospace, "Cascadia Code", monospace;
      font-size: 11px; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .wip-title {
      font-size: 12px; font-weight: 600; color: var(--text); flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .wip-copy {
      flex-shrink: 0; font-size: 10px; padding: 2px 7px; border-radius: 4px;
      border: 1px solid rgba(124,106,247,0.4); background: transparent;
      color: var(--accent); cursor: pointer; transition: all .15s;
    }
    .wip-copy:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .wip-copy.copied { border-color: var(--col-done); color: var(--col-done); background: transparent; }

    .branch-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    .modified-badge {
      font-size: 11px; padding: 1px 6px;
      background: rgba(251,146,60,.15); color: #fb923c;
      border-radius: 10px; margin-left: auto;
    }
    .focus-text { font-size: 13px; color: var(--text); line-height: 1.6; }
    .commit-list { display: flex; flex-direction: column; gap: 7px; }
    .commit-item {
      display: flex; align-items: flex-start; gap: 7px; font-size: 12px;
      cursor: pointer; border-radius: var(--radius-sm); padding: 3px 4px; margin: -3px -4px;
      transition: background .1s;
    }
    .commit-item:hover { background: var(--surface-hover); }
    .commit-hash {
      font-family: ui-monospace, "Cascadia Code", monospace;
      font-size: 11px; color: var(--accent); flex-shrink: 0; padding-top: 1px;
    }
    .commit-msg { color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Commit detail panel ─────────────────────── */
    #commit-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity .15s;
    }
    #commit-overlay.open { opacity: 1; pointer-events: auto; }
    #commit-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: min(580px, 90vw); max-height: 75vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
      transform: translateY(8px) scale(.98); transition: transform .15s;
    }
    #commit-overlay.open #commit-panel { transform: translateY(0) scale(1); }
    .commit-detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
    .commit-detail-meta { font-size: 12px; color: var(--text-muted); }
    .commit-detail-msg  { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.6; }
    .commit-section-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
    .commit-ticket-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .commit-ticket-chip {
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: var(--surface-raised);
      color: var(--accent); cursor: pointer; font-family: ui-monospace, monospace;
      transition: background .1s, border-color .1s;
    }
    .commit-ticket-chip:hover { background: var(--accent-dim); border-color: var(--accent); }
    .commit-file-list { display: flex; flex-direction: column; gap: 3px; }
    .commit-file {
      font-family: ui-monospace, "Cascadia Code", monospace; font-size: 11px;
      color: var(--text-muted); padding: 2px 0;
    }
    .sidebar-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .summary-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    .summary-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Board ────────────────────────────────── */
    #board {
      display: flex; overflow-x: auto; overflow-y: hidden;
      padding: 14px; gap: 10px; background: var(--bg);
      align-items: flex-start;
    }
    .column {
      display: flex; flex-direction: column;
      min-width: 210px; flex: 1; max-width: 320px;
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
      max-height: 100%;
    }
    .column-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 13px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .column-title {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    }
    .col-indicator { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .column-count {
      font-size: 11px; font-weight: 600; color: var(--text);
      background: var(--surface-hover); border: 1px solid var(--border-hover);
      padding: 1px 8px; border-radius: 10px;
    }
    .column-body {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .column-empty {
      display: flex; align-items: center; justify-content: center;
      min-height: 60px; color: var(--text-dim); font-size: 12px;
      border: 1px dashed var(--border-muted); border-radius: var(--radius-sm);
    }

    /* Column status theming */
    .col-open       .col-indicator { background: var(--col-open); }
    .col-open       .column-title  { color: var(--col-open); }
    .col-progress   .col-indicator { background: var(--col-progress); }
    .col-progress   .column-title  { color: var(--col-progress); }
    .col-done       .col-indicator { background: var(--col-done); }
    .col-done       .column-title  { color: var(--col-done); }
    .col-discarded  .col-indicator { background: var(--col-discarded); }
    .col-discarded  .column-title  { color: var(--col-discarded); }

    /* Discarded column is visually de-emphasized */
    .col-discarded  .column-body   { opacity: .55; }
    .col-discarded  { max-width: 200px; min-width: 160px; }

    /* ── Show more / less ────────────────────────── */
    .col-show-more {
      display: block; width: 100%; margin-top: 6px;
      padding: 6px; border-radius: var(--radius-sm);
      border: 1px dashed var(--border-hover); background: none;
      color: var(--text-muted); font-size: 12px; cursor: pointer;
      transition: background .12s, color .12s;
    }
    .col-show-more:hover { background: var(--surface-raised); color: var(--text); }
    .col-show-less { border-style: solid; }

    /* ── Drag and drop ───────────────────────────── */
    .card.dragging  { opacity: .35; transform: scale(.97); pointer-events: none; }
    .column-body.drag-over {
      outline: 2px dashed var(--accent); outline-offset: -4px;
      background: var(--accent-dim); border-radius: var(--radius-sm);
    }

    /* ── Card ─────────────────────────────────── */
    .card {
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      cursor: grab; transition: border-color .12s, background .12s, transform .1s;
      user-select: none;
    }
    .card:active { cursor: grabbing; }
    .card:hover          { border-color: var(--border-hover); background: var(--surface-hover); transform: translateY(-1px); }
    .card.focused        { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-dim); }
    .card-top            { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .card-id             { font-family: ui-monospace, "Cascadia Code", monospace; font-size: 11px; color: var(--text-muted); }
    .card-title          { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 7px; }
    .card-footer         { display: flex; align-items: center; justify-content: space-between; gap: 6px; min-width: 0; }
    .card-age            { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .ready-indicator     { display: flex; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0; }
    .ready-dot           { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ready-indicator.ready     .ready-dot { background: var(--col-done); }
    .ready-indicator.not-ready .ready-dot { background: var(--border-hover); }
    .ready-label         { font-size: 10px; font-weight: 600; letter-spacing: .04em; white-space: nowrap; }
    .ready-indicator.ready     .ready-label { color: var(--col-done); }
    .ready-indicator.not-ready .ready-label { color: var(--text-muted); }
    .ready-popover {
      position: fixed; z-index: 9999; pointer-events: none;
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 11px;
      font-size: 11px; color: var(--text); line-height: 1.7;
      box-shadow: 0 4px 14px rgba(0,0,0,.35);
      opacity: 0; transition: opacity .15s;
    }
    .ready-popover.visible { opacity: 1; }

    /* Type badges */
    .type-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
    .type-bug     { background: rgba(248,113,113,.15); color: #f87171; }
    .type-feature { background: rgba(167,139,250,.15); color: #a78bfa; }
    .type-task    { background: rgba(96,165,250,.15);  color: #60a5fa; }
    .type-chore   { background: rgba(156,163,175,.12); color: #9ca3af; }
    .type-epic    { background: rgba(251,146,60,.15);  color: #fb923c; }

    /* Priority dots */
    .priority-dots { display: flex; gap: 3px; align-items: center; }
    .pdot          { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
    .pdot.on       { background: var(--accent); }
    .p0 .pdot.on   { background: #f87171; }
    .p1 .pdot.on   { background: #fb923c; }
    .p2 .pdot.on   { background: var(--accent); }
    .p3 .pdot.on   { background: #60a5fa; }
    .p4 .pdot.on   { background: var(--text-dim); }

    /* ── Modal ────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      backdrop-filter: blur(3px); display: flex; align-items: center;
      justify-content: center; z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity .15s;
    }
    #modal-overlay.open { opacity: 1; pointer-events: auto; }
    #modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: min(680px,90vw); max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
      transform: translateY(8px) scale(.98); transition: transform .15s;
    }
    #modal-overlay.open #modal { transform: translateY(0) scale(1); }

    .modal-header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-id    { font-family: ui-monospace, "Cascadia Code", monospace; font-size: 12px; color: var(--text-muted); flex-shrink:0; }
    .modal-title { flex: 1; font-size: 15px; font-weight: 600; color: var(--text); }
    .modal-close {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 14px; transition: background .1s; flex-shrink: 0;
    }
    .modal-close:hover { background: var(--surface-raised); color: var(--text); }

    .modal-meta {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      padding: 9px 20px; border-bottom: 1px solid var(--border-muted);
      background: var(--surface-raised); flex-shrink: 0;
    }
    .meta-item  { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .meta-label { color: var(--text-muted); font-size: 12px; }
    .meta-val   { color: var(--text); font-weight: 500; }

    .modal-docs {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      padding: 8px 20px; border-bottom: 1px solid var(--border-muted);
      background: var(--surface-raised); flex-shrink: 0;
    }
    .modal-docs:empty { display: none; }
    .doc-tab {
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); cursor: pointer; transition: background .1s, color .1s, border-color .1s;
    }
    .doc-tab:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-hover); }
    .doc-tab.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .doc-tab-new {
      padding: 3px 10px; border-radius: 20px; font-size: 12px;
      border: 1px dashed var(--border-hover); background: transparent;
      color: var(--text-muted); cursor: pointer; transition: color .1s, border-color .1s;
    }
    .doc-tab-new:hover { color: var(--text); border-color: var(--accent); }
    .doc-edit-btn {
      margin-left: auto; padding: 3px 10px; border-radius: 20px; font-size: 12px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); cursor: pointer; transition: background .1s, color .1s;
    }
    .doc-edit-btn:hover { background: var(--surface-hover); color: var(--text); }

    .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
    .modal-body-text {
      font-size: 13px; color: var(--text-muted); line-height: 1.75; white-space: pre-wrap;
    }
    .modal-edit-area {
      width: 100%; height: 100%; min-height: 200px; resize: vertical;
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: ui-monospace, "Cascadia Code", monospace; font-size: 13px;
      line-height: 1.6; padding: 12px; outline: none;
      transition: border-color .1s;
    }
    .modal-edit-area:focus { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: var(--accent); opacity: .85; }
    .modal-empty { color: var(--text-dim); font-style: italic; }

    /* ── Doc type picker ─────────────────────────── */
    .doc-picker-label { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .doc-type-card {
      display: block; width: 100%;
      padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 6px;
      border: 1px solid var(--border); background: var(--surface-raised);
      cursor: pointer; text-align: left;
      transition: border-color .12s, background .12s;
    }
    .doc-type-card:hover    { border-color: var(--border-hover); background: var(--surface-hover); }
    .doc-type-card.suggested { border-color: var(--accent); background: var(--accent-dim); }
    .doc-type-name {
      font-size: 13px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 7px; margin-bottom: 1px;
    }
    .doc-type-hint  { font-size: 12px; color: var(--text-muted); }
    .doc-type-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      padding: 1px 7px; border-radius: 10px; background: var(--accent); color: #fff;
    }

    .modal-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-actions { display: flex; gap: 8px; }

    .btn {
      padding: 5px 13px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface-raised);
      color: var(--text); font-size: 12px; cursor: pointer;
      transition: background .1s, border-color .1s;
    }
    .btn:hover    { background: var(--surface-hover); border-color: var(--border-hover); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }
    .btn-danger   { color: #f87171; }
    .btn-danger:hover { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); }

    .theme-toggle {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface-raised);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: background .1s, border-color .1s;
      flex-shrink: 0; line-height: 1;
    }
    .theme-toggle:hover { background: var(--surface-hover); border-color: var(--border-hover); }

    .kbd-hint { font-size: 12px; color: var(--text-dim); }

    /* ── Create ticket button ────────────────────── */
    .create-btn {
      padding: 5px 13px; border-radius: 6px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--accent); background: var(--accent-dim);
      color: var(--accent); cursor: pointer; flex-shrink: 0;
      transition: background .1s, color .1s;
    }
    .create-btn:hover { background: var(--accent); color: #fff; }

    /* ── Create modal ────────────────────────────── */
    #create-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity .15s;
    }
    #create-overlay.open { opacity: 1; pointer-events: auto; }
    #create-modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: min(560px, 90vw);
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
      transform: translateY(8px) scale(.98); transition: transform .15s;
    }
    #create-overlay.open #create-modal { transform: translateY(0) scale(1); }

    .create-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .create-input {
      width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface-raised);
      color: var(--text); font-size: 14px; outline: none;
      transition: border-color .1s;
    }
    .create-input:focus { border-color: var(--accent); }
    .create-detect {
      font-size: 12px; color: var(--text-muted); min-height: 16px;
      padding-left: 2px;
    }
    .create-row { display: flex; align-items: center; gap: 10px; }
    .create-label { font-size: 12px; color: var(--text-muted); width: 52px; flex-shrink: 0; }
    .create-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .create-pill {
      padding: 3px 11px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); cursor: pointer; transition: all .1s;
    }
    .create-pill:hover  { border-color: var(--border-hover); color: var(--text); }
    .create-pill.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .create-textarea { min-height: 140px; resize: vertical; }

    /* ── Scrollbars ───────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>
<div id="app">

  <header id="header">
    <div class="header-left">
      <div class="brand">
        <div class="brand-icon">S</div>
        sprint-check
      </div>

    </div>
    <div class="header-right">
      <div class="header-branch">
        <div class="refresh-dot loading" id="refresh-dot"></div>
        <span>⎇</span>
        <span class="branch-name" id="h-branch">—</span>
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="dot" style="color:var(--col-open)"></span>

        <div class="stat">
          <span class="dot" style="color:var(--col-progress)"></span>

<!-- Modal -->

<!-- Create ticket modal -->

<script>
'use strict';

// ── Config ───────────────────────────────────────────────────────────────

const COLUMNS = [
  { status: 'open',        label: 'Open',        cls: 'col-open',      dotVar: '--col-open'       },
  { status: 'in_progress', label: 'In Progress',  cls: 'col-progress',  dotVar: '--col-progress'   },
  { status: 'closed',      label: 'Done',         cls: 'col-done',      dotVar: '--col-done'       },
  { status: 'cancelled',   label: 'Discarded',    cls: 'col-discarded', dotVar: '--col-discarded'  },
];
const STATUS_ORDER = COLUMNS.map(c => c.status);

// ── Mock data (fallback when server not running) ──────────────────────────

const MOCK = {
  tickets: [
    { id:'t-ialk', status:'in_progress', type:'feature', priority:1,
      title:'Build sprint-check GUI — kanban app.html + Python server',
      created: ago(1), body:'## Goal\nSelf-contained HTML kanban board served by Python stdlib HTTP server.\n\n## Columns\n- Open\n- In Progress\n- Done\n- Discarded\n\n## Sidebar\nHANDOFF Current Focus + recent git log + ticket summary.' },
    { id:'t-sc02', status:'open', type:'task', priority:2,
      title:'Wire server.py to read real .tickets/ files',
      created: ago(0.5), body:'Connect GET /api/tickets to actual ticket files.\nParse YAML frontmatter and return JSON.' },
    { id:'t-sc03', status:'open', type:'task', priority:2,
      title:'Add POST endpoint for status changes',
      created: ago(0.3), body:'POST /api/ticket/:id/status updates the YAML status field in place without corrupting the markdown body.' },
    { id:'t-sc04', status:'open', type:'chore', priority:3,
      title:'Register sprint-check in skills.sh + CATALOG',
      created: ago(0.1), body:'Add skill doc (sprint-check.md), register with skills.sh, update CATALOG.md.' },
    { id:'t-sc05', status:'closed', type:'task', priority:2,
      title:'Design folder structure under tools/',
      created: ago(2), body:'Decision: tools/sprint-check/ for server.py + app.html. Launcher at tools/sprint-check.sh.' },
    { id:'t-sc06', status:'closed', type:'task', priority:1,
      title:'Research cross-platform GUI framework',
      created: ago(3), body:'Evaluated Electrobun, Zero Native (Vercel Labs), Neutralinojs, Python tkinter.\n\nDecision: Python http.server + browser — zero install, works on macOS / Linux / WSL.' },
    { id:'t-sc07', status:'cancelled', type:'feature', priority:3,
      title:'Native window via Electrobun',
      created: ago(4), body:'Dropped — macOS only, requires Bun runtime. Python + browser covers all targets.' },
  ],
  handoff: {
    focus: 'Building sprint-check — local kanban dashboard for canon projects. Sprinting the GUI (app.html) now.',
  },
  git: {
    project: 'canon',
    branch:  'main',
    modified: 3,
    log: [
      { hash:'f9078a1', message:'feat: add changes summary table to wrapup' },
      { hash:'8344b7b', message:'feat: silent-pass for all-LOW impact' },
      { hash:'fbddcff', message:'chore: expand sprint skills list summary' },
      { hash:'a1f41d7', message:'feat: add impact-analysis sub-skill' },
      { hash:'1a33da2', message:'docs: update setup guide' },
    ],
  },
};

function ago(days) {
  return new Date(Date.now() - days * 86400000).toISOString();
}

// ── State ────────────────────────────────────────────────────────────────

const COLLAPSE_STATUSES = new Set(['closed', 'cancelled']);
const COL_LIMIT = 5;

// ── Ticket creation ───────────────────────────────────────────────────────

const TICKET_TYPES = ['feature', 'task', 'bug', 'chore', 'epic'];

const TYPE_TEMPLATES = {
  feature: `## Goal\nWhat problem does this solve?\n\n## Acceptance Criteria\n- [ ] \n\n## Notes\n`,
  task:    `## What\n\n## Why\n\n## Done When\n- [ ] \n`,
  bug:     `## Steps to Reproduce\n1. \n\n## Expected\n\n## Actual\n\n## Proposed Fix\n`,
  chore:   `## What\n\n## Why\n`,
  epic:    `## Goal\n\n## Sub-tasks\n- [ ] \n- [ ] \n\n## Success Metrics\n`,
};

function detectTicketType(title) {
  const t = title.toLowerCase();
  if (/\b(fix|bug|error|crash|broken|regression|failing|cannot|can'?t)\b/.test(t))
    return { type: 'bug',     reason: 'looks like a bug fix' };
  if (/\b(epic|initiative|milestone|programme|program)\b/.test(t))
    return { type: 'epic',    reason: 'looks like an epic' };
  if (/\b(chore|cleanup|clean up|remove|delete|deprecat|upgrade|bump|renovate)\b/.test(t))
    return { type: 'chore',   reason: 'looks like maintenance' };
  if (/\b(add|build|implement|create|introduce|new|design|support)\b/.test(t))
    return { type: 'feature', reason: 'looks like a new feature' };
  return   { type: 'task',    reason: 'general task' };
}

const DOC_TYPES = [
  {
    name: 'Blueprint',   slug: 'blueprint',
    hint: 'Plan the approach, scope, and open questions before building.',
    suggestedFor: ['open', 'in_progress'],
    template:
`# Blueprint

## Goal
What problem does this solve and what does success look like?

## Approach
How will we implement it? Key design decisions.

## Out of Scope
What are we explicitly NOT doing?

## Open Questions
- `,
  },
  {
    name: 'Decisions',   slug: 'decisions',
    hint: 'Record key choices, trade-offs, and why alternatives were ruled out.',
    suggestedFor: ['in_progress', 'closed'],
    template:
`# Decisions

### [Decision title]
- **Choice**:
- **Why**:
- **Alternatives considered**:
`,
  },
  {
    name: 'QA',          slug: 'qa',
    hint: 'Test plan and sign-off checklist before closing.',
    suggestedFor: ['in_progress', 'closed'],
    template:
`# QA

## Test Plan
- [ ]
- [ ]

## Edge Cases
- [ ]

## Sign-off
- [ ] Tested locally
`,
  },
  {
    name: 'Notes',       slug: 'notes',
    hint: 'Freeform scratchpad for research, links, and observations.',
    suggestedFor: ['open', 'in_progress', 'closed', 'cancelled'],
    template: '# Notes\n\n',
  },
];

function recommendedSlug(status, existingSlugs) {
  if (status === 'open') return 'blueprint';
  if (status === 'in_progress') return existingSlugs.includes('blueprint') ? 'decisions' : 'blueprint';
  return 'decisions';
}
const state = { tickets:[], handoff:null, git:null, selectedId:null, expandedCols: new Set() };

// ── Data layer ───────────────────────────────────────────────────────────

async function loadData() {
  setDot('loading');
  try {
    const [tr, hr, gr] = await Promise.all([
      fetch('/api/tickets'),
      fetch('/api/handoff'),
      fetch('/api/git'),
    ]);
    if (!tr.ok) throw new Error();
    state.tickets = await tr.json();
    state.handoff = await hr.json();
    state.git     = await gr.json();
    setDot('live');
  } catch {
    state.tickets = MOCK.tickets;
    state.handoff = MOCK.handoff;
    state.git     = MOCK.git;
    setDot('mock');
  }
  render();
}

function setDot(s) {
  const el = document.getElementById('refresh-dot');
  el.className = 'refresh-dot' + (s !== 'live' ? ' ' + s : '');
}

// ── Helpers ───────────────────────────────────────────────────────────────

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function titleCase(s) {
  return String(s ?? '').replace(/\b\w/g, c => c.toUpperCase());
}

function age(iso) {
  if (!iso) return '';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 2)   return 'just now';
  if (m < 60)  return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 30)  return `${d}d ago`;
  return `${Math.floor(d/30)}mo ago`;
}

function typeBadge(type) {
  const t = type || 'task';
  return `<span class="type-badge type-${esc(t)}">${esc(t)}</span>`;
}

function priorityDots(p) {
  p = p ?? 2;
  const filled = 5 - p;
  let h = `<div class="priority-dots p${p}">`;
  for (let i = 0; i < 5; i++) h += `<div class="pdot${i < filled ? ' on' : ''}"></div>`;
  return h + '</div>';
}

// Minimal markdown: headers, bold, inline code, bullet lists
function md(raw) {
  if (!raw) return '';
  return esc(raw)
    .replace(/^# (.+)$/gm,  '<strong style="display:block;font-size:15px;color:var(--text);margin:10px 0 4px">$1</strong>')
    .replace(/^## (.+)$/gm, '<strong style="display:block;font-size:14px;color:var(--text);margin:8px 0 4px">$1</strong>')
    .replace(/^### (.+)$/gm,'<strong style="display:block;color:var(--text);margin:6px 0 3px">$1</strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--text)">$1</strong>')
    .replace(/`([^`]+)`/g,  '<code style="font-family:ui-monospace,monospace;font-size:11px;background:var(--surface-raised);padding:1px 5px;border-radius:3px;color:var(--accent)">$1</code>')
    .replace(/^- (.+)$/gm,  '<span style="display:block;margin:1px 0">· $1</span>');
}

// ── Render ────────────────────────────────────────────────────────────────

function render() {
  renderHeader();
  renderSidebar();
  renderBoard();
}

function renderHeader() {
  const { git, tickets } = state;
  setText('h-project',  git?.project || 'project');
  setText('h-branch',   git?.branch  || '—');
  setText('s-branch',   git?.branch  || '—');
  setText('h-open',     tickets.filter(t => t.status === 'open').length);
  setText('h-active',   tickets.filter(t => t.status === 'in_progress').length);
  const mod = document.getElementById('s-modified');
  if ((git?.modified ?? 0) > 0) { mod.textContent = `${git.modified} modified`; mod.style.display=''; }
  else mod.style.display = 'none';
}

function renderSidebar() {
  const { handoff, git, tickets } = state;

  // Now Working On
  const wip    = tickets.filter(t => t.status === 'in_progress');
  const wipEl  = document.getElementById('s-wip');
  const wipItems = document.getElementById('s-wip-items');
  if (wip.length) {
    wipEl.classList.add('has-items');
    wipItems.innerHTML = wip.map(t =>
      `<div class="wip-item" data-id="${esc(t.id)}" role="button" tabindex="0" title="Open ticket">` +
        `<span class="wip-id">${esc(t.id)}</span>` +
        `<span class="wip-title">${esc(t.title)}</span>` +
        `<button class="wip-copy" data-copy="${esc(t.id)}: " title="Copy commit prefix — paste into your git commit message">copy</button>` +
      `</div>`
    ).join('');
    wipItems.querySelectorAll('.wip-item').forEach(row => {
      row.addEventListener('click', e => {
        if (e.target.classList.contains('wip-copy')) return;
        openModal(row.dataset.id);
      });
      row.addEventListener('keydown', e => {
        if (e.key === 'Enter') row.click();
      });
    });
    wipItems.querySelectorAll('.wip-copy').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        navigator.clipboard.writeText(btn.dataset.copy).then(() => {
          btn.textContent = 'done'; btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
        });
      });
    });
  } else {
    wipEl.classList.remove('has-items');
  }

  setText('s-focus', handoff?.focus || 'No HANDOFF.md Current Focus found.');

  const commitsEl = document.getElementById('s-commits');
  commitsEl.innerHTML = (git?.log ?? []).slice(0,5).map(c =>
    `<div class="commit-item" data-hash="${esc(c.hash)}">` +
      `<span class="commit-hash">${esc(c.hash.slice(0,7))}</span>` +
      `<span class="commit-msg">${esc(c.message)}</span>` +
    `</div>`
  ).join('') || '<span style="color:var(--text-dim);font-size:12px">No commits</span>';

  commitsEl.querySelectorAll('.commit-item').forEach(el => {
    el.addEventListener('click', () => openCommitPanel(el.dataset.hash));
  });

  document.getElementById('s-summary').innerHTML = COLUMNS.map(col => {
    const count = tickets.filter(t => t.status === col.status).length;
    const dotColor = col.status === 'in_progress' ? 'var(--col-progress)'
                   : col.status === 'cancelled'   ? 'var(--col-discarded)'
                   : `var(--col-${col.status})`;
    return `<div class="summary-item">
      <div class="summary-dot" style="background:${dotColor}"></div>
      <span>${count} ${esc(col.label.toLowerCase())}</span>
    </div>`;
  }).join('');
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = COLUMNS.map(col => {
    const cards = state.tickets
      .filter(t => t.status === col.status)
      .sort((a, b) => (b.created || '').localeCompare(a.created || ''));
    const limited = COLLAPSE_STATUSES.has(col.status) && !state.expandedCols.has(col.status);
    const visible = limited ? cards.slice(0, COL_LIMIT) : cards;
    const hidden  = cards.length - visible.length;
    return `
      <div class="column ${esc(col.cls)}">
        <div class="column-header">
          <div class="column-title"><div class="col-indicator"></div>${esc(col.label)}</div>
          ${cards.length > 0 ? `<span class="column-count">${cards.length}</span>` : ''}
        </div>
        <div class="column-body" data-status="${esc(col.status)}">
          ${visible.length
            ? visible.map(t => cardHTML(t)).join('')
            : '<div class="column-empty">empty</div>'}
          ${hidden > 0
            ? `<button class="col-show-more" data-status="${esc(col.status)}">+${hidden} more</button>`
            : ''}
          ${state.expandedCols.has(col.status) && cards.length > COL_LIMIT
            ? `<button class="col-show-more col-show-less" data-status="${esc(col.status)}">Show less ↑</button>`
            : ''}
        </div>
      </div>`;
  }).join('');

  board.querySelectorAll('.col-show-more').forEach(btn => {
    btn.addEventListener('click', () => {
      const s = btn.dataset.status;
      if (state.expandedCols.has(s)) state.expandedCols.delete(s);
      else state.expandedCols.add(s);
      renderBoard();
    });
  });

  let dragId = null;

  // Ready indicator popover
  let _popoverTimer = null;
  let _popover = document.getElementById('ready-popover');
  if (!_popover) {
    _popover = document.createElement('div');
    _popover.id = 'ready-popover';
    _popover.className = 'ready-popover';
    document.body.appendChild(_popover);
  }
  function showReadyPopover(el, t) {
    const { ready, hasDesc, hasDocs } = readiness(t);
    _popover.innerHTML =
      `<div>${hasDesc ? '✓' : '○'} Description</div>` +
      `<div>${hasDocs ? '✓' : '○'} Docs (blueprint, decisions…)</div>` +
      (ready ? '<div style="margin-top:4px;color:var(--col-done)">Good to go</div>'
             : '<div style="margin-top:4px;color:var(--text-muted)">Add missing items to unblock</div>');
    const r = el.getBoundingClientRect();
    _popover.style.left = `${r.left}px`;
    _popover.style.top  = `${r.top - _popover.offsetHeight - 8}px`;
    _popover.classList.add('visible');
    clearTimeout(_popoverTimer);
    // reposition after paint (height now known)
    requestAnimationFrame(() => {
      _popover.style.top = `${r.top - _popover.offsetHeight - 8}px`;
    });
    _popoverTimer = setTimeout(() => _popover.classList.remove('visible'), 3000);
  }

  board.querySelectorAll('.ready-indicator').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const t = state.tickets.find(x => x.id === el.dataset.id);
      if (t) showReadyPopover(el, t);
    });
  });

  board.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.id));

    el.addEventListener('dragstart', e => {
      dragId = el.dataset.id;
      e.dataTransfer.setData('text/plain', dragId); // required by Safari to activate drag
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => el.classList.add('dragging'));
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      dragId = null;
    });
  });

  board.querySelectorAll('.column-body').forEach(col => {
    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drag-over');
    });
    col.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      if (!dragId) return;
      const newStatus = col.dataset.status;
      const t = state.tickets.find(t => t.id === dragId);
      if (t && t.status !== newStatus) moveCard(t, newStatus);
    });
  });
}

function readiness(t) {
  const hasDesc = (t.body || '').replace(/^#[^\n]*\n?/, '').trim().length > 0;
  const hasDocs = (t.docs || []).length > 0;
  const ready = hasDesc && hasDocs;
  const label = ready ? 'ready'
    : (!hasDesc && !hasDocs) ? 'not ready'
    : !hasDesc ? 'needs desc'
    : 'needs docs';
  return { ready, hasDesc, hasDocs, label };
}

function cardHTML(t) {
  const { ready, label } = readiness(t);
  return `
    <div class="card${t.id === state.selectedId ? ' focused' : ''}" data-id="${esc(t.id)}" draggable="true">
      <div class="card-top">
        <span class="card-id">${esc(t.id)}</span>
        ${typeBadge(t.type)}
      </div>
      <div class="card-title">${esc(t.title)}</div>
      <div class="card-footer">
        ${priorityDots(t.priority)}
        <span class="card-age">${esc(age(t.created))}</span>
        <span class="ready-indicator ${ready ? 'ready' : 'not-ready'}" data-id="${esc(t.id)}">
          <span class="ready-dot"></span>
          <span class="ready-label">${label}</span>
        </span>
      </div>
    </div>`;
}

// ── Modal ─────────────────────────────────────────────────────────────────

const modalState = { editMode: false, activeDoc: null /* null = ticket body */ };

function openModal(id) {
  const t = state.tickets.find(t => t.id === id);
  if (!t) return;
  state.selectedId = id;
  modalState.editMode = false;
  modalState.activeDoc = null;

  setText('m-id',    t.id);
  setText('m-title', t.title);
  document.getElementById('m-type').innerHTML = typeBadge(t.type);

  const statusColor = {
    open: 'var(--col-open)', in_progress: 'var(--col-progress)',
    closed: 'var(--col-done)', cancelled: 'var(--col-discarded)',
  }[t.status] || 'var(--text)';
  const { ready: mReady, label: mReadyLabel } = readiness(t);
  const mReadyColor = mReady ? 'var(--col-done)' : 'var(--text-muted)';
  document.getElementById('m-meta').innerHTML = [
    { label:'Status',   html:`<span style="color:${statusColor};font-weight:500">${esc(titleCase(t.status.replace('_',' ')))}</span>` },
    { label:'Type',     val: titleCase(t.type || 'task') },
    { label:'Priority', val: `P${t.priority ?? 2}` },
    { label:'Age',      val: age(t.created) || '—' },
    { label:'Ready',    html:`<span style="color:${mReadyColor};font-weight:600;display:flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:${mReadyColor};display:inline-block;flex-shrink:0"></span>${esc(mReadyLabel)}</span>` },
  ].map(m => `<div class="meta-item"><span class="meta-label">${esc(m.label)}</span><span class="meta-val">${m.html ?? esc(m.val)}</span></div>`).join('');

  renderModalDocs(t);
  renderModalBody(t);
  refreshModalActions(t);
  document.getElementById('modal-overlay').classList.add('open');
  renderBoard();
}

function renderModalDocs(t) {
  const docs = t.docs || [];
  const bar = document.getElementById('m-docs');
  // Only show the Description tab when there are other docs to switch between
  const allTabs = docs.length > 0 ? [{ name: 'Description', file: null }, ...docs] : docs;

  bar.innerHTML = allTabs.map(d => {
    const active = d.file === modalState.activeDoc;
    return `<button class="doc-tab${active ? ' active' : ''}" data-file="${d.file ?? ''}">${esc(d.name)}</button>`;
  }).join('') +
  `<button class="doc-tab-new" id="btn-new-doc" title="Add companion doc">+ New doc</button>` +
  `<button class="doc-edit-btn" id="btn-edit-doc">Edit</button>`;

  bar.querySelectorAll('.doc-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      if (modalState.editMode) return;
      modalState.activeDoc = btn.dataset.file || null;
      renderModalDocs(t);
      renderModalBody(t);
    });
  });

  document.getElementById('btn-new-doc').addEventListener('click', () => promptNewDoc(t));
  document.getElementById('btn-edit-doc').addEventListener('click', () => enterEditMode(t));
}

function renderModalBody(t) {
  const bodyEl  = document.getElementById('m-body');
  const editEl  = document.getElementById('m-edit-area');
  editEl.style.display = 'none';
  bodyEl.style.display = '';

  if (modalState.activeDoc) {
    bodyEl.innerHTML = '<span class="modal-empty">Loading…</span>';
    fetch(`/api/doc/${encodeURIComponent(modalState.activeDoc)}`)
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => { bodyEl.innerHTML = d.content ? md(d.content) : '<span class="modal-empty">Empty doc.</span>'; })
      .catch(() => { bodyEl.innerHTML = '<span class="modal-empty">Could not load doc.</span>'; });
  } else {
    let body = (t.body || '').trim();
    // strip leading H1 if it duplicates the title shown in the modal header
    body = body.replace(/^#[ \t]+.+(\r?\n|$)/, '').trim();
    bodyEl.innerHTML = body ? md(body) : '<span class="modal-empty">No description.</span>';
  }
}

function enterEditMode(t) {
  modalState.editMode = true;
  const bodyEl = document.getElementById('m-body');
  const editEl = document.getElementById('m-edit-area');

  if (modalState.activeDoc) {
    fetch(`/api/doc/${encodeURIComponent(modalState.activeDoc)}`)
      .then(r => r.ok ? r.json() : { content: '' })
      .then(d => { editEl.value = d.content || ''; });
  } else {
    editEl.value = (t.body || '').trim();
  }

  bodyEl.style.display = 'none';
  editEl.style.display = 'block';
  editEl.focus();

  document.getElementById('m-actions').innerHTML =
    `<button class="btn btn-primary" id="act-save">Save</button>` +
    `<button class="btn" id="act-cancel">Cancel</button>`;
  document.getElementById('m-kbd').style.display = 'none';

  document.getElementById('act-save').addEventListener('click', () => saveEdit(t));
  document.getElementById('act-cancel').addEventListener('click', () => exitEditMode(t));
}

function exitEditMode(t) {
  modalState.editMode = false;
  setText('m-title', t.title);
  renderModalDocs(t);
  renderModalBody(t);
  refreshModalActions(t);
  document.getElementById('m-kbd').style.display = '';
  renderBoard();
}

async function saveEdit(t) {
  const content = document.getElementById('m-edit-area').value;
  try {
    if (modalState.activeDoc) {
      await fetch(`/api/doc/${encodeURIComponent(modalState.activeDoc)}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      });
    } else {
      await fetch(`/api/ticket/${t.id}/body`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ body: content }),
      });
      t.body = content;
      const headingMatch = content.match(/^#\s+(.+)$/m);
      if (headingMatch) t.title = headingMatch[1].trim();
    }
  } catch { /* server unavailable */ }
  exitEditMode(t);
}

function promptNewDoc(t) {
  const bodyEl = document.getElementById('m-body');
  const editEl = document.getElementById('m-edit-area');
  editEl.style.display = 'none';
  bodyEl.style.display = '';

  const existingSlugs = (t.docs || []).map(d => d.file.replace(`${t.id}-`, '').replace('.md', ''));
  const suggested     = recommendedSlug(t.status, existingSlugs);
  const done = t.status === 'closed' || t.status === 'cancelled';
  const available = DOC_TYPES.filter(dt =>
    !existingSlugs.includes(dt.slug) && !(done && dt.slug === 'blueprint')
  );
  const statusLabel   = titleCase(t.status.replace('_', ' '));

  bodyEl.innerHTML = [
    `<div class="doc-picker-label">This ticket is <strong>${esc(statusLabel)}</strong> — choose a doc type to add:</div>`,
    ...available.map(dt =>
      `<button class="doc-type-card${dt.slug === suggested ? ' suggested' : ''}" data-slug="${esc(dt.slug)}" data-name="${esc(dt.name)}">` +
        `<div class="doc-type-name">${esc(dt.name)}${dt.slug === suggested ? ' <span class="doc-type-badge">Suggested</span>' : ''}</div>` +
        `<div class="doc-type-hint">${esc(dt.hint)}</div>` +
      `</button>`
    ),
    available.length === 0 ? '<div class="modal-empty">All doc types already created.</div>' : '',
  ].join('');

  document.getElementById('m-actions').innerHTML =
    `<button class="btn" id="act-picker-cancel">Cancel</button>`;
  document.getElementById('m-kbd').style.display = 'none';

  document.getElementById('act-picker-cancel').addEventListener('click', () => {
    renderModalBody(t); renderModalDocs(t); refreshModalActions(t);
    document.getElementById('m-kbd').style.display = '';
  });

  bodyEl.querySelectorAll('.doc-type-card').forEach(card => {
    card.addEventListener('click', () => selectDocType(t, card.dataset.slug, card.dataset.name));
  });
}

function selectDocType(t, slug, name) {
  const file     = `${t.id}-${slug}.md`;
  const template = DOC_TYPES.find(d => d.slug === slug)?.template || `# ${name}\n\n`;

  fetch(`/api/doc/${encodeURIComponent(file)}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: template }),
  }).then(() => {
    t.docs = t.docs || [];
    if (!t.docs.some(d => d.file === file)) t.docs.push({ name, file });
    modalState.activeDoc = file;
    renderModalDocs(t);
    // pre-fill textarea with template and enter edit mode
    const bodyEl = document.getElementById('m-body');
    const editEl = document.getElementById('m-edit-area');
    bodyEl.style.display = 'none';
    editEl.value = template;
    editEl.style.display = 'block';
    editEl.focus();
    modalState.editMode = true;
    document.getElementById('m-actions').innerHTML =
      `<button class="btn btn-primary" id="act-save">Save</button>` +
      `<button class="btn" id="act-cancel">Cancel</button>`;
    document.getElementById('m-kbd').style.display = 'none';
    document.getElementById('act-save').addEventListener('click', () => saveEdit(t));
    document.getElementById('act-cancel').addEventListener('click', () => exitEditMode(t));
  });
}

function closeModal() {
  if (modalState.editMode) return; // don't close while editing
  document.getElementById('modal-overlay').classList.remove('open');
  state.selectedId = null;
  renderBoard();
}

function refreshModalActions(t) {
  const idx = STATUS_ORDER.indexOf(t.status);
  const prev = idx > 0 ? COLUMNS[idx-1].label : null;
  const next = idx < STATUS_ORDER.length-1 ? COLUMNS[idx+1].label : null;
  const showDiscard = t.status !== 'cancelled' && t.status !== 'closed';
  document.getElementById('m-actions').innerHTML = `
    ${prev ? `<button class="btn" id="act-prev">← Back</button>` : ''}
    ${next ? `<button class="btn" id="act-next">${esc(next)} →</button>` : ''}
    ${showDiscard ? '<button class="btn btn-danger" id="act-discard">Discard ✕</button>' : ''}
  `;
  document.getElementById('act-prev')?.addEventListener('click', () => moveCard(t, STATUS_ORDER[idx-1]));
  document.getElementById('act-next')?.addEventListener('click', () => moveCard(t, STATUS_ORDER[idx+1]));
  document.getElementById('act-discard')?.addEventListener('click', () => moveCard(t, 'cancelled'));
}

async function moveCard(t, newStatus) {
  try {
    await fetch(`/api/ticket/${t.id}/status`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
  } catch { /* server unavailable — update local state only */ }
  t.status = newStatus;
  const modalOpen = document.getElementById('modal-overlay').classList.contains('open');
  if (modalOpen) closeModal(); else renderBoard();
}

// ── Semantic ticket matching ──────────────────────────────────────────────

const _STOP = new Set(['a','an','the','and','or','in','on','for','to','of','with','by',
  'from','is','are','was','were','be','been','as','at','it','its','this','that','into',
  'via','add','fix','feat','chore','refactor','update','remove','change']);

function tokenize(s) {
  return s.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/)
    .filter(w => w.length > 2 && !_STOP.has(w));
}

function semanticScore(commitText, ticketTitle) {
  const ctoks = new Set(tokenize(commitText));
  const ttoks  = tokenize(ticketTitle);
  const hits   = ttoks.filter(w => ctoks.has(w)).length;
  return hits / Math.max(ttoks.length, 1);
}

// ── Commit detail panel ───────────────────────────────────────────────────

async function openCommitPanel(hash) {
  const overlay = document.getElementById('commit-overlay');
  document.getElementById('co-hash').textContent    = hash.slice(0, 7);
  document.getElementById('co-subject').textContent = '…';
  document.getElementById('co-meta').textContent    = '';
  document.getElementById('co-body').textContent    = '';
  document.getElementById('co-tickets').innerHTML   = '';
  document.getElementById('co-files').innerHTML     = '';
  overlay.classList.add('open');

  try {
    const d = await fetch(`/api/commit/${hash}`).then(r => r.json());
    document.getElementById('co-subject').textContent = d.subject;
    document.getElementById('co-meta').textContent    = `${d.author}  ·  ${d.date}`;
    document.getElementById('co-body').textContent    = d.body || '';

    const ticketsEl = document.getElementById('co-tickets');
    const direct    = state.tickets.filter(t => d.related_ticket_ids.includes(t.id));

    let chips, label, note = '';
    if (direct.length) {
      chips = direct;
      label = 'Related tickets';
    } else {
      // Semantic backfill: score all tickets against the commit text
      const commitText = `${d.subject} ${d.body} ${d.files.join(' ')}`;
      const scored = state.tickets
        .filter(t => t.status !== 'cancelled')
        .map(t => ({ t, score: semanticScore(commitText, t.title) }))
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score);
      chips = scored.map(x => x.t);
      label = chips.length ? 'Likely related tickets' : 'Active sprint context';
      note  = chips.length
        ? `<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">No ticket IDs in commit — matched by keyword.</div>`
        : `<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">No ticket IDs in commit. Tip: prefix commits with <code>${state.tickets.find(t=>t.status==='in_progress')?.id ?? 't-xxxx'}: </code></div>`;
      if (!chips.length) chips = state.tickets.filter(t => t.status === 'open' || t.status === 'in_progress');
    }

    if (chips.length) {
      ticketsEl.innerHTML =
        `<div class="commit-section-label">${label}</div>${note}` +
        `<div class="commit-ticket-chips">` +
        chips.map(t =>
          `<button class="commit-ticket-chip" data-id="${esc(t.id)}">${esc(t.id)} — ${esc(t.title)}</button>`
        ).join('') + `</div>`;
      ticketsEl.querySelectorAll('.commit-ticket-chip').forEach(btn => {
        btn.addEventListener('click', () => { closeCommitPanel(); openModal(btn.dataset.id); });
      });
    }

    if (d.files.length) {
      document.getElementById('co-files').innerHTML =
        `<div class="commit-section-label">${d.files.length} file${d.files.length > 1 ? 's' : ''} changed</div>` +
        `<div class="commit-file-list">` +
        d.files.map(f => `<div class="commit-file">${esc(f)}</div>`).join('') +
        `</div>`;
    }
  } catch {
    document.getElementById('co-subject').textContent = 'Could not load commit.';
  }
}

function closeCommitPanel() {
  document.getElementById('commit-overlay').classList.remove('open');
}

document.getElementById('commit-close').addEventListener('click', closeCommitPanel);
document.getElementById('commit-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCommitPanel();
});

// ── Create ticket ─────────────────────────────────────────────────────────

(function initCreate() {
  const overlay  = document.getElementById('create-overlay');
  const titleEl  = document.getElementById('c-title');
  const detectEl = document.getElementById('c-detect');
  const typesEl  = document.getElementById('c-types');
  const priEl    = document.getElementById('c-priorities');
  const bodyEl   = document.getElementById('c-body');
  const queueEl  = document.getElementById('c-queue');

  let selectedType = 'task';
  let selectedPri  = 2;
  let templateUntouched = true;

  function open() {
    selectedType = 'task'; selectedPri = 2; templateUntouched = true;
    titleEl.value = ''; bodyEl.value = ''; detectEl.textContent = '';
    queueEl.textContent = '→ will open in: Open';
    renderTypePills(); renderPriPills();
    overlay.classList.add('open');
    requestAnimationFrame(() => titleEl.focus());
  }

  function close() { overlay.classList.remove('open'); }

  function renderTypePills() {
    typesEl.innerHTML = TICKET_TYPES.map(tp =>
      `<button class="create-pill${tp === selectedType ? ' active' : ''}" data-type="${tp}">${titleCase(tp)}</button>`
    ).join('');
    typesEl.querySelectorAll('.create-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedType = btn.dataset.type;
        detectEl.textContent = '';
        applyTemplate();
        renderTypePills();
      });
    });
  }

  function renderPriPills() {
    priEl.innerHTML = [0,1,2,3,4].map(p =>
      `<button class="create-pill${p === selectedPri ? ' active' : ''}" data-pri="${p}">P${p}</button>`
    ).join('');
    priEl.querySelectorAll('.create-pill').forEach(btn => {
      btn.addEventListener('click', () => { selectedPri = +btn.dataset.pri; renderPriPills(); });
    });
  }

  function applyTemplate() {
    if (!templateUntouched) return;
    bodyEl.value = TYPE_TEMPLATES[selectedType] || '';
    templateUntouched = true;
  }

  bodyEl.addEventListener('input', () => {
    // once the user edits away from the template, stop auto-filling
    templateUntouched = bodyEl.value === (TYPE_TEMPLATES[selectedType] || '');
  });

  let detectTimer;
  titleEl.addEventListener('input', () => {
    clearTimeout(detectTimer);
    detectTimer = setTimeout(() => {
      const title = titleEl.value.trim();
      if (!title) { detectEl.textContent = ''; return; }
      const { type, reason } = detectTicketType(title);
      detectEl.textContent = `Detected: ${titleCase(type)} — ${reason}`;
      if (type !== selectedType) {
        selectedType = type;
        applyTemplate();
        renderTypePills();
      }
    }, 350);
  });

  async function submit() {
    const title = titleEl.value.trim();
    if (!title) { titleEl.focus(); titleEl.style.borderColor = 'var(--col-discarded)'; return; }
    titleEl.style.borderColor = '';
    document.getElementById('c-submit').disabled = true;
    try {
      const ticket = await fetch('/api/tickets', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, type: selectedType, status: 'open', priority: selectedPri, body: bodyEl.value }),
      }).then(r => r.json());
      state.tickets.unshift(ticket);
      renderBoard();
      close();
    } catch {
      document.getElementById('c-submit').disabled = false;
    }
  }

  document.getElementById('btn-create').addEventListener('click', open);
  document.getElementById('create-close').addEventListener('click', close);
  document.getElementById('c-cancel').addEventListener('click', close);
  document.getElementById('c-submit').addEventListener('click', submit);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  titleEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
})();

// ── Keyboard ──────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  const open = document.getElementById('modal-overlay').classList.contains('open');
  if (!open) return;

  if (e.key === 'Escape') {
    if (modalState.editMode) {
      const t = state.tickets.find(t => t.id === state.selectedId);
      if (t) exitEditMode(t);
    } else {
      closeModal();
    }
    return;
  }

  if (modalState.editMode) return; // don't move cards while editing

  const t = state.tickets.find(t => t.id === state.selectedId);
  if (!t) return;
  const idx = STATUS_ORDER.indexOf(t.status);

  if (e.key === 'ArrowLeft'  && idx > 0)                     moveCard(t, STATUS_ORDER[idx-1]);
  if (e.key === 'ArrowRight' && idx < STATUS_ORDER.length-1) moveCard(t, STATUS_ORDER[idx+1]);
});

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('btn-close').addEventListener('click', () => {
  if (modalState.editMode) {
    const t = state.tickets.find(t => t.id === state.selectedId);
    if (t) exitEditMode(t);
  } else {
    closeModal();
  }
});

function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = String(val ?? '');
}

// ── Sidebar collapse + resize ─────────────────────────────────────────────

(function initSidebar() {
  const sidebar      = document.getElementById('sidebar');
  const toggle       = document.getElementById('sidebar-toggle');
  const handle       = document.getElementById('sidebar-resize');
  const W_KEY        = 'sprint-check-sidebar-w';
  const C_KEY        = 'sprint-check-sidebar-collapsed';
  const MIN_W = 160, MAX_W = 480, DEFAULT_W = 240;

  let width     = parseInt(localStorage.getItem(W_KEY) || DEFAULT_W);
  let collapsed = localStorage.getItem(C_KEY) === 'true';

  function applyState(animate) {
    if (!animate) sidebar.style.transition = 'none';
    if (collapsed) {
      sidebar.classList.add('collapsed');
      sidebar.style.width = '36px';   // must override inline width explicitly
      handle.style.display = 'none';
    } else {
      sidebar.classList.remove('collapsed');
      sidebar.style.width = width + 'px';
      handle.style.display = '';
    }
    if (!animate) requestAnimationFrame(() => { sidebar.style.transition = ''; });
  }

  toggle.addEventListener('click', () => {
    collapsed = !collapsed;
    localStorage.setItem(C_KEY, collapsed);
    applyState(true);
  });

  // Drag-to-resize
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX;
    startW = sidebar.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    width = Math.min(MAX_W, Math.max(MIN_W, startW + (e.clientX - startX)));
    sidebar.style.width = width + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    localStorage.setItem(W_KEY, width);
  });

  applyState(false);
})();

// ── Theme toggle ──────────────────────────────────────────────────────────

(function initTheme() {
  const btn  = document.getElementById('theme-toggle');
  const html = document.documentElement;
  const stored = localStorage.getItem('sprint-check-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = stored ? stored === 'dark' : prefersDark;

  function apply(dark) {
    if (dark) {
      html.removeAttribute('data-theme');
      btn.textContent = '🌙';
    } else {
      html.setAttribute('data-theme', 'light');
      btn.textContent = '☀️';
    }
    localStorage.setItem('sprint-check-theme', dark ? 'dark' : 'light');
  }

  apply(isDark);
  btn.addEventListener('click', () => apply(html.getAttribute('data-theme') === 'light'));
})();

// ── Boot ──────────────────────────────────────────────────────────────────

loadData();
setInterval(loadData, 8000);
</script>
