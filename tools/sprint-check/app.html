<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sprint-check</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #0d0d10;
      --surface:        #13131a;
      --surface-raised: #1a1a24;
      --surface-hover:  #1e1e2a;
      --border:         #232333;
      --border-muted:   #1b1b28;
      --border-hover:   #353548;
      --text:           #e0e0ec;
      --text-muted:     #6a6a82;
      --text-dim:       #363650;
      --accent:         #7c6af7;
      --accent-dim:     rgba(124,106,247,0.12);

      --col-open:       #94a3b8;
      --col-progress:   #60a5fa;
      --col-done:       #4ade80;
      --col-discarded:  #f87171;

      --sidebar-w: 240px;
      --header-h:  48px;
      --radius:    8px;
      --radius-sm: 5px;
    }

    /* ── Light mode overrides ─────────────────── */
    html[data-theme="light"] {
      --bg:             #f2f2f7;
      --surface:        #ffffff;
      --surface-raised: #f7f7fc;
      --surface-hover:  #ededf5;
      --border:         #dcdce8;
      --border-muted:   #e8e8f2;
      --border-hover:   #c0c0d4;
      --text:           #1a1a2e;
      --text-muted:     #52527a;
      --text-dim:       #b8b8d0;
      --accent:         #6c5cf7;
      --accent-dim:     rgba(108,92,247,0.10);

      --col-open:       #64748b;
      --col-progress:   #2563eb;
      --col-done:       #16a34a;
      --col-discarded:  #dc2626;
    }

    /* smooth theme transition */
    html { transition: background .2s, color .2s; }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px; line-height: 1.5; overflow: hidden; }

    /* ── App shell ────────────────────────────── */
    #app { display: grid; grid-template-rows: var(--header-h) 1fr; height: 100vh; }

    /* ── Header ───────────────────────────────── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; border-bottom: 1px solid var(--border);
      background: var(--surface); gap: 12px;
    }
    .header-left  { display: flex; align-items: center; gap: 10px; }
    .brand        { display: flex; align-items: center; gap: 8px; font-weight: 600; letter-spacing: -.3px; }
    .brand-icon   { width: 20px; height: 20px; background: var(--accent); border-radius: 5px;
                    display: flex; align-items: center; justify-content: center;
                    font-size: 11px; color: #fff; font-weight: 700; flex-shrink: 0; }
    .header-sep   { color: var(--border-hover); font-size: 16px; }
    .header-project { font-size: 13px; color: var(--text-muted); }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-branch {
      display: flex; align-items: center; gap: 5px; font-size: 12px;
      color: var(--text-muted);
    }
    .branch-name { font-family: ui-monospace, "Cascadia Code", monospace; color: var(--accent); }
    .refresh-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--col-done);
                   transition: background .3s; flex-shrink: 0; }
    .refresh-dot.mock    { background: #fb923c; }
    .refresh-dot.loading { background: var(--col-progress); animation: pulse 1s infinite; }
    .refresh-dot.error   { background: var(--col-discarded); }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    .header-stats { display: flex; gap: 8px; }
    .stat {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 9px; background: var(--surface-raised);
      border: 1px solid var(--border); border-radius: 20px; font-size: 11px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink:0; }

    /* ── Main layout ──────────────────────────── */
    #main { display: flex; overflow: hidden; }

    /* ── Sidebar ──────────────────────────────── */
    #sidebar {
      flex-shrink: 0; width: var(--sidebar-w);
      border-right: 1px solid var(--border); background: var(--surface);
      overflow: hidden; display: flex; flex-direction: column;
      transition: width .2s ease;
    }
    #sidebar.collapsed { width: 36px; }

    .sidebar-toggle {
      flex-shrink: 0; height: 34px;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 9px; border-bottom: 1px solid var(--border-muted);
      cursor: pointer; color: var(--text-muted);
      transition: background .1s, color .1s;
    }
    .sidebar-toggle:hover { background: var(--surface-raised); color: var(--text); }
    #sidebar.collapsed .sidebar-toggle { justify-content: center; }
    .sidebar-toggle svg { width: 14px; height: 14px; stroke: currentColor;
                          fill: none; stroke-width: 2; stroke-linecap: round;
                          stroke-linejoin: round; flex-shrink: 0;
                          transition: transform .2s; }
    #sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }

    .sidebar-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    /* ── Resize handle ────────────────────────── */
    #sidebar-resize {
      width: 5px; flex-shrink: 0; cursor: col-resize;
      background: transparent; transition: background .15s;
    }
    #sidebar-resize:hover, #sidebar-resize.dragging { background: var(--accent); }
    .sidebar-section { padding: 14px 16px; border-bottom: 1px solid var(--border-muted); }
    .sidebar-label {
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
    }
    .branch-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    .modified-badge {
      font-size: 11px; padding: 1px 6px;
      background: rgba(251,146,60,.15); color: #fb923c;
      border-radius: 10px; margin-left: auto;
    }
    .focus-text { font-size: 13px; color: var(--text); line-height: 1.6; }
    .commit-list { display: flex; flex-direction: column; gap: 7px; }
    .commit-item { display: flex; align-items: flex-start; gap: 7px; font-size: 12px; }
    .commit-hash {
      font-family: ui-monospace, "Cascadia Code", monospace;
      font-size: 11px; color: var(--accent); flex-shrink: 0; padding-top: 1px;
    }
    .commit-msg { color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .summary-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    .summary-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Board ────────────────────────────────── */
    #board {
      display: flex; overflow-x: auto; overflow-y: hidden;
      padding: 14px; gap: 10px; background: var(--bg);
      align-items: flex-start;
    }
    .column {
      display: flex; flex-direction: column;
      min-width: 210px; flex: 1; max-width: 320px;
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
      max-height: 100%;
    }
    .column-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 13px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .column-title {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    }
    .col-indicator { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .column-count {
      font-size: 11px; font-weight: 600; color: var(--text);
      background: var(--surface-hover); border: 1px solid var(--border-hover);
      padding: 1px 8px; border-radius: 10px;
    }
    .column-body {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .column-empty {
      display: flex; align-items: center; justify-content: center;
      min-height: 60px; color: var(--text-dim); font-size: 12px;
      border: 1px dashed var(--border-muted); border-radius: var(--radius-sm);
    }

    /* Column status theming */
    .col-open       .col-indicator { background: var(--col-open); }
    .col-open       .column-title  { color: var(--col-open); }
    .col-progress   .col-indicator { background: var(--col-progress); }
    .col-progress   .column-title  { color: var(--col-progress); }
    .col-done       .col-indicator { background: var(--col-done); }
    .col-done       .column-title  { color: var(--col-done); }
    .col-discarded  .col-indicator { background: var(--col-discarded); }
    .col-discarded  .column-title  { color: var(--col-discarded); }

    /* Discarded column is visually de-emphasized */
    .col-discarded  .column-body   { opacity: .55; }
    .col-discarded  { max-width: 200px; min-width: 160px; }

    /* ── Card ─────────────────────────────────── */
    .card {
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      cursor: pointer; transition: border-color .12s, background .12s, transform .1s;
      user-select: none;
    }
    .card:hover          { border-color: var(--border-hover); background: var(--surface-hover); transform: translateY(-1px); }
    .card.focused        { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-dim); }
    .card-top            { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .card-id             { font-family: ui-monospace, "Cascadia Code", monospace; font-size: 10px; color: var(--text-dim); }
    .card-title          { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 7px; }
    .card-footer         { display: flex; align-items: center; justify-content: space-between; }
    .card-age            { font-size: 11px; color: var(--text-muted); }

    /* Type badges */
    .type-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
    .type-bug     { background: rgba(248,113,113,.15); color: #f87171; }
    .type-feature { background: rgba(167,139,250,.15); color: #a78bfa; }
    .type-task    { background: rgba(96,165,250,.15);  color: #60a5fa; }
    .type-chore   { background: rgba(156,163,175,.12); color: #9ca3af; }
    .type-epic    { background: rgba(251,146,60,.15);  color: #fb923c; }

    /* Priority dots */
    .priority-dots { display: flex; gap: 3px; align-items: center; }
    .pdot          { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
    .pdot.on       { background: var(--accent); }
    .p0 .pdot.on   { background: #f87171; }
    .p1 .pdot.on   { background: #fb923c; }
    .p2 .pdot.on   { background: var(--accent); }
    .p3 .pdot.on   { background: #60a5fa; }
    .p4 .pdot.on   { background: var(--text-dim); }

    /* ── Modal ────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      backdrop-filter: blur(3px); display: flex; align-items: center;
      justify-content: center; z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity .15s;
    }
    #modal-overlay.open { opacity: 1; pointer-events: auto; }
    #modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: min(680px,90vw); max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
      transform: translateY(8px) scale(.98); transition: transform .15s;
    }
    #modal-overlay.open #modal { transform: translateY(0) scale(1); }

    .modal-header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-id    { font-family: ui-monospace, "Cascadia Code", monospace; font-size: 12px; color: var(--text-muted); flex-shrink:0; }
    .modal-title { flex: 1; font-size: 15px; font-weight: 600; color: var(--text); }
    .modal-close {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 14px; transition: background .1s; flex-shrink: 0;
    }
    .modal-close:hover { background: var(--surface-raised); color: var(--text); }

    .modal-meta {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      padding: 9px 20px; border-bottom: 1px solid var(--border-muted);
      background: var(--surface-raised); flex-shrink: 0;
    }
    .meta-item  { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .meta-label { color: var(--text-muted); font-size: 12px; }
    .meta-val   { color: var(--text); font-weight: 500; }

    .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
    .modal-body-text {
      font-size: 13px; color: var(--text-muted); line-height: 1.75; white-space: pre-wrap;
    }
    .modal-empty { color: var(--text-dim); font-style: italic; }

    .modal-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-actions { display: flex; gap: 8px; }

    .btn {
      padding: 5px 13px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface-raised);
      color: var(--text); font-size: 12px; cursor: pointer;
      transition: background .1s, border-color .1s;
    }
    .btn:hover    { background: var(--surface-hover); border-color: var(--border-hover); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }
    .btn-danger   { color: #f87171; }
    .btn-danger:hover { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); }

    .theme-toggle {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface-raised);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: background .1s, border-color .1s;
      flex-shrink: 0; line-height: 1;
    }
    .theme-toggle:hover { background: var(--surface-hover); border-color: var(--border-hover); }

    .kbd-hint { display: flex; gap: 12px; font-size: 13px; color: var(--text-muted); align-items: center; }
    .kbd-hint kbd {
      font-size: 12px; padding: 2px 6px; background: var(--surface-raised);
      border: 1px solid var(--border-hover); border-radius: 4px;
      font-family: ui-monospace, monospace; color: var(--text);
    }

    /* ── Scrollbars ───────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>
<div id="app">

  <header id="header">
    <div class="header-left">
      <div class="brand">
        <div class="brand-icon">S</div>
        sprint-check
      </div>
      <span class="header-sep">/</span>
      <span class="header-project" id="h-project">—</span>
    </div>
    <div class="header-right">
      <div class="header-branch">
        <div class="refresh-dot loading" id="refresh-dot"></div>
        <span>⎇</span>
        <span class="branch-name" id="h-branch">—</span>
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="dot" style="color:var(--col-open)"></span>
          <span id="h-open">—</span> open
        </div>
        <div class="stat">
          <span class="dot" style="color:var(--col-progress)"></span>
          <span id="h-active">—</span> active
        </div>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">🌙</button>
    </div>
  </header>

  <div id="main">
    <aside id="sidebar">
      <div class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
        <!-- chevron-left icon -->
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="sidebar-content">
        <div class="sidebar-section">
          <div class="sidebar-label">Git</div>
          <div class="branch-row">
            <span style="color:var(--text-dim)">⎇</span>
            <span style="font-family:ui-monospace,monospace;font-size:12px;color:var(--accent)" id="s-branch">—</span>
            <span class="modified-badge" id="s-modified" style="display:none"></span>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Current Focus</div>
          <div class="focus-text" id="s-focus">—</div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Recent Commits</div>
          <div class="commit-list" id="s-commits"></div>
        </div>

        <div class="sidebar-section" style="border-bottom:none">
          <div class="sidebar-label">Tickets</div>
          <div class="sidebar-summary" id="s-summary"></div>
        </div>
      </div>
    </aside>

    <div id="sidebar-resize"></div>
    <div id="board"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-header">
      <span class="modal-id" id="m-id"></span>
      <span id="m-type"></span>
      <div class="modal-title" id="m-title"></div>
      <button class="modal-close" id="btn-close">✕</button>
    </div>
    <div class="modal-meta" id="m-meta"></div>
    <div class="modal-body">
      <div class="modal-body-text" id="m-body"></div>
    </div>
    <div class="modal-footer">
      <div class="modal-actions" id="m-actions"></div>
      <div class="kbd-hint">
        <span><kbd>←</kbd> <kbd>→</kbd> move status</span>
        <span><kbd>esc</kbd> close</span>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ── Config ───────────────────────────────────────────────────────────────

const COLUMNS = [
  { status: 'open',        label: 'Open',        cls: 'col-open',      dotVar: '--col-open'       },
  { status: 'in_progress', label: 'In Progress',  cls: 'col-progress',  dotVar: '--col-progress'   },
  { status: 'closed',      label: 'Done',         cls: 'col-done',      dotVar: '--col-done'       },
  { status: 'cancelled',   label: 'Discarded',    cls: 'col-discarded', dotVar: '--col-discarded'  },
];
const STATUS_ORDER = COLUMNS.map(c => c.status);

// ── Mock data (fallback when server not running) ──────────────────────────

const MOCK = {
  tickets: [
    { id:'t-ialk', status:'in_progress', type:'feature', priority:1,
      title:'Build sprint-check GUI — kanban app.html + Python server',
      created: ago(1), body:'## Goal\nSelf-contained HTML kanban board served by Python stdlib HTTP server.\n\n## Columns\n- Open\n- In Progress\n- Done\n- Discarded\n\n## Sidebar\nHANDOFF Current Focus + recent git log + ticket summary.' },
    { id:'t-sc02', status:'open', type:'task', priority:2,
      title:'Wire server.py to read real .tickets/ files',
      created: ago(0.5), body:'Connect GET /api/tickets to actual ticket files.\nParse YAML frontmatter and return JSON.' },
    { id:'t-sc03', status:'open', type:'task', priority:2,
      title:'Add POST endpoint for status changes',
      created: ago(0.3), body:'POST /api/ticket/:id/status updates the YAML status field in place without corrupting the markdown body.' },
    { id:'t-sc04', status:'open', type:'chore', priority:3,
      title:'Register sprint-check in skills.sh + CATALOG',
      created: ago(0.1), body:'Add skill doc (sprint-check.md), register with skills.sh, update CATALOG.md.' },
    { id:'t-sc05', status:'closed', type:'task', priority:2,
      title:'Design folder structure under tools/',
      created: ago(2), body:'Decision: tools/sprint-check/ for server.py + app.html. Launcher at tools/sprint-check.sh.' },
    { id:'t-sc06', status:'closed', type:'task', priority:1,
      title:'Research cross-platform GUI framework',
      created: ago(3), body:'Evaluated Electrobun, Zero Native (Vercel Labs), Neutralinojs, Python tkinter.\n\nDecision: Python http.server + browser — zero install, works on macOS / Linux / WSL.' },
    { id:'t-sc07', status:'cancelled', type:'feature', priority:3,
      title:'Native window via Electrobun',
      created: ago(4), body:'Dropped — macOS only, requires Bun runtime. Python + browser covers all targets.' },
  ],
  handoff: {
    focus: 'Building sprint-check — local kanban dashboard for canon projects. Sprinting the GUI (app.html) now.',
  },
  git: {
    project: 'canon',
    branch:  'main',
    modified: 3,
    log: [
      { hash:'f9078a1', message:'feat: add changes summary table to wrapup' },
      { hash:'8344b7b', message:'feat: silent-pass for all-LOW impact' },
      { hash:'fbddcff', message:'chore: expand sprint skills list summary' },
      { hash:'a1f41d7', message:'feat: add impact-analysis sub-skill' },
      { hash:'1a33da2', message:'docs: update setup guide' },
    ],
  },
};

function ago(days) {
  return new Date(Date.now() - days * 86400000).toISOString();
}

// ── State ────────────────────────────────────────────────────────────────

const state = { tickets:[], handoff:null, git:null, selectedId:null };

// ── Data layer ───────────────────────────────────────────────────────────

async function loadData() {
  setDot('loading');
  try {
    const [tr, hr, gr] = await Promise.all([
      fetch('/api/tickets'),
      fetch('/api/handoff'),
      fetch('/api/git'),
    ]);
    if (!tr.ok) throw new Error();
    state.tickets = await tr.json();
    state.handoff = await hr.json();
    state.git     = await gr.json();
    setDot('live');
  } catch {
    state.tickets = MOCK.tickets;
    state.handoff = MOCK.handoff;
    state.git     = MOCK.git;
    setDot('mock');
  }
  render();
}

function setDot(s) {
  const el = document.getElementById('refresh-dot');
  el.className = 'refresh-dot' + (s !== 'live' ? ' ' + s : '');
}

// ── Helpers ───────────────────────────────────────────────────────────────

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function age(iso) {
  if (!iso) return '';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 2)   return 'just now';
  if (m < 60)  return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 30)  return `${d}d ago`;
  return `${Math.floor(d/30)}mo ago`;
}

function typeBadge(type) {
  const t = type || 'task';
  return `<span class="type-badge type-${esc(t)}">${esc(t)}</span>`;
}

function priorityDots(p) {
  p = p ?? 2;
  const filled = 5 - p;
  let h = `<div class="priority-dots p${p}">`;
  for (let i = 0; i < 5; i++) h += `<div class="pdot${i < filled ? ' on' : ''}"></div>`;
  return h + '</div>';
}

// Minimal markdown: headers, bold, inline code, bullet lists
function md(raw) {
  if (!raw) return '';
  return esc(raw)
    .replace(/^# (.+)$/gm,  '<strong style="display:block;font-size:15px;color:var(--text);margin:10px 0 4px">$1</strong>')
    .replace(/^## (.+)$/gm, '<strong style="display:block;font-size:14px;color:var(--text);margin:8px 0 4px">$1</strong>')
    .replace(/^### (.+)$/gm,'<strong style="display:block;color:var(--text);margin:6px 0 3px">$1</strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--text)">$1</strong>')
    .replace(/`([^`]+)`/g,  '<code style="font-family:ui-monospace,monospace;font-size:11px;background:var(--surface-raised);padding:1px 5px;border-radius:3px;color:var(--accent)">$1</code>')
    .replace(/^- (.+)$/gm,  '<span style="display:block;margin:1px 0">· $1</span>');
}

// ── Render ────────────────────────────────────────────────────────────────

function render() {
  renderHeader();
  renderSidebar();
  renderBoard();
}

function renderHeader() {
  const { git, tickets } = state;
  setText('h-project',  git?.project || 'project');
  setText('h-branch',   git?.branch  || '—');
  setText('s-branch',   git?.branch  || '—');
  setText('h-open',     tickets.filter(t => t.status === 'open').length);
  setText('h-active',   tickets.filter(t => t.status === 'in_progress').length);
  const mod = document.getElementById('s-modified');
  if ((git?.modified ?? 0) > 0) { mod.textContent = `${git.modified} modified`; mod.style.display=''; }
  else mod.style.display = 'none';
}

function renderSidebar() {
  const { handoff, git, tickets } = state;
  setText('s-focus', handoff?.focus || 'No HANDOFF.md Current Focus found.');

  const commitsEl = document.getElementById('s-commits');
  commitsEl.innerHTML = (git?.log ?? []).slice(0,5).map(c => `
    <div class="commit-item">
      <span class="commit-hash">${esc(c.hash.slice(0,7))}</span>
      <span class="commit-msg">${esc(c.message)}</span>
    </div>`).join('') || '<span style="color:var(--text-dim);font-size:12px">No commits</span>';

  document.getElementById('s-summary').innerHTML = COLUMNS.map(col => {
    const count = tickets.filter(t => t.status === col.status).length;
    const dotColor = col.status === 'in_progress' ? 'var(--col-progress)'
                   : col.status === 'cancelled'   ? 'var(--col-discarded)'
                   : `var(--col-${col.status})`;
    return `<div class="summary-item">
      <div class="summary-dot" style="background:${dotColor}"></div>
      <span>${count} ${esc(col.label.toLowerCase())}</span>
    </div>`;
  }).join('');
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = COLUMNS.map(col => {
    const cards = state.tickets.filter(t => t.status === col.status);
    return `
      <div class="column ${esc(col.cls)}">
        <div class="column-header">
          <div class="column-title"><div class="col-indicator"></div>${esc(col.label)}</div>
          <span class="column-count">${cards.length}</span>
        </div>
        <div class="column-body">
          ${cards.length
            ? cards.map(t => cardHTML(t)).join('')
            : '<div class="column-empty">empty</div>'}
        </div>
      </div>`;
  }).join('');

  board.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.id));
  });
}

function cardHTML(t) {
  return `
    <div class="card${t.id === state.selectedId ? ' focused' : ''}" data-id="${esc(t.id)}">
      <div class="card-top">
        <span class="card-id">${esc(t.id)}</span>
        ${typeBadge(t.type)}
      </div>
      <div class="card-title">${esc(t.title)}</div>
      <div class="card-footer">
        ${priorityDots(t.priority)}
        <span class="card-age">${esc(age(t.created))}</span>
      </div>
    </div>`;
}

// ── Modal ─────────────────────────────────────────────────────────────────

function openModal(id) {
  const t = state.tickets.find(t => t.id === id);
  if (!t) return;
  state.selectedId = id;

  setText('m-id',    t.id);
  setText('m-title', t.title);
  document.getElementById('m-type').innerHTML = typeBadge(t.type);

  const statusColor = {
    open: 'var(--col-open)', in_progress: 'var(--col-progress)',
    closed: 'var(--col-done)', cancelled: 'var(--col-discarded)',
  }[t.status] || 'var(--text)';
  document.getElementById('m-meta').innerHTML = [
    { label:'Status',   html:`<span style="color:${statusColor};font-weight:500">${esc(t.status.replace('_',' '))}</span>` },
    { label:'Type',     val: t.type || 'task' },
    { label:'Priority', val: `p${t.priority ?? 2}` },
    { label:'Age',      val: age(t.created) || '—' },
  ].map(m => `<div class="meta-item"><span class="meta-label">${esc(m.label)}</span><span class="meta-val">${m.html ?? esc(m.val)}</span></div>`).join('');

  const body = (t.body || '').trim();
  document.getElementById('m-body').innerHTML = body
    ? md(body)
    : '<span class="modal-empty">No description.</span>';

  refreshModalActions(t);
  document.getElementById('modal-overlay').classList.add('open');
  renderBoard();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  state.selectedId = null;
  renderBoard();
}

function refreshModalActions(t) {
  const idx = STATUS_ORDER.indexOf(t.status);
  const prev = idx > 0 ? COLUMNS[idx-1].label : null;
  const next = idx < STATUS_ORDER.length-1 ? COLUMNS[idx+1].label : null;
  document.getElementById('m-actions').innerHTML = `
    ${prev ? `<button class="btn" id="act-prev">← ${esc(prev)}</button>` : ''}
    ${next ? `<button class="btn" id="act-next">${esc(next)} →</button>` : ''}
    ${t.status !== 'cancelled' ? '<button class="btn btn-danger" id="act-discard">Discard ✕</button>' : ''}
  `;
  document.getElementById('act-prev')?.addEventListener('click', () => moveCard(t, STATUS_ORDER[idx-1]));
  document.getElementById('act-next')?.addEventListener('click', () => moveCard(t, STATUS_ORDER[idx+1]));
  document.getElementById('act-discard')?.addEventListener('click', () => moveCard(t, 'cancelled'));
}

async function moveCard(t, newStatus) {
  try {
    await fetch(`/api/ticket/${t.id}/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
  } catch { /* server unavailable — update local state only */ }
  t.status = newStatus;
  closeModal();
}

// ── Keyboard ──────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  const open = document.getElementById('modal-overlay').classList.contains('open');
  if (!open) return;

  if (e.key === 'Escape') { closeModal(); return; }

  const t = state.tickets.find(t => t.id === state.selectedId);
  if (!t) return;
  const idx = STATUS_ORDER.indexOf(t.status);

  if (e.key === 'ArrowLeft'  && idx > 0)                     moveCard(t, STATUS_ORDER[idx-1]);
  if (e.key === 'ArrowRight' && idx < STATUS_ORDER.length-1) moveCard(t, STATUS_ORDER[idx+1]);
});

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('btn-close').addEventListener('click', closeModal);

// ── Util ──────────────────────────────────────────────────────────────────

function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = String(val ?? '');
}

// ── Sidebar collapse + resize ─────────────────────────────────────────────

(function initSidebar() {
  const sidebar      = document.getElementById('sidebar');
  const toggle       = document.getElementById('sidebar-toggle');
  const handle       = document.getElementById('sidebar-resize');
  const W_KEY        = 'sprint-check-sidebar-w';
  const C_KEY        = 'sprint-check-sidebar-collapsed';
  const MIN_W = 160, MAX_W = 480, DEFAULT_W = 240;

  let width     = parseInt(localStorage.getItem(W_KEY) || DEFAULT_W);
  let collapsed = localStorage.getItem(C_KEY) === 'true';

  function applyState(animate) {
    if (!animate) sidebar.style.transition = 'none';
    if (collapsed) {
      sidebar.classList.add('collapsed');
      sidebar.style.width = '36px';   // must override inline width explicitly
      handle.style.display = 'none';
    } else {
      sidebar.classList.remove('collapsed');
      sidebar.style.width = width + 'px';
      handle.style.display = '';
    }
    if (!animate) requestAnimationFrame(() => { sidebar.style.transition = ''; });
  }

  toggle.addEventListener('click', () => {
    collapsed = !collapsed;
    localStorage.setItem(C_KEY, collapsed);
    applyState(true);
  });

  // Drag-to-resize
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX;
    startW = sidebar.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    width = Math.min(MAX_W, Math.max(MIN_W, startW + (e.clientX - startX)));
    sidebar.style.width = width + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    localStorage.setItem(W_KEY, width);
  });

  applyState(false);
})();

// ── Theme toggle ──────────────────────────────────────────────────────────

(function initTheme() {
  const btn  = document.getElementById('theme-toggle');
  const html = document.documentElement;
  const stored = localStorage.getItem('sprint-check-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = stored ? stored === 'dark' : prefersDark;

  function apply(dark) {
    if (dark) {
      html.removeAttribute('data-theme');
      btn.textContent = '🌙';
    } else {
      html.setAttribute('data-theme', 'light');
      btn.textContent = '☀️';
    }
    localStorage.setItem('sprint-check-theme', dark ? 'dark' : 'light');
  }

  apply(isDark);
  btn.addEventListener('click', () => apply(html.getAttribute('data-theme') === 'light'));
})();

// ── Boot ──────────────────────────────────────────────────────────────────

loadData();
setInterval(loadData, 8000);
</script>
